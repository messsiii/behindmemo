version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: behindmemory-app
    ports:
      - "80:3000"
    env_file:
      - .env.production
    restart: unless-stopped
    volumes:
      # 挂载Prisma目录（用于数据库迁移）
      - ./prisma:/app/prisma:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/version', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - behindmemory-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  behindmemory-network:
    driver: bridge
